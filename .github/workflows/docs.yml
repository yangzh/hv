name: Deploy docs

on:
  push:
    # Deploy docs only when a release tag lands (synced from primary).
    # Raw markdown on main may be ahead of the deployed site — this is
    # intentional so the published docs stay in lockstep with PyPI.
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install mdBook and plugins
        run: |
          mkdir -p $HOME/bin
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.5.2/mdbook-v0.5.2-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C $HOME/bin
          curl -sSL -o $HOME/bin/mdbook-pdf https://github.com/HollowMan6/mdbook-pdf/releases/download/v0.1.13/mdbook-pdf-v0.1.13-x86_64-unknown-linux-gnu \
            && chmod +x $HOME/bin/mdbook-pdf
          curl -sSL https://github.com/lzanini/mdbook-katex/releases/download/0.10.0-alpha-binaries/mdbook-katex-v0.10.0-alpha-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C $HOME/bin
          curl -sSL https://github.com/RustForWeb/mdbook-plugins/releases/download/v0.3.4/mdbook-tabs-v0.3.4-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C $HOME/bin
          curl -sSL https://github.com/badboy/mdbook-last-changed/releases/download/v0.4.0/mdbook-last-changed-v0.4.0-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C $HOME/bin
          echo "$HOME/bin" >> $GITHUB_PATH
      - name: Install tab assets
        run: cd docs && mdbook-tabs install
      - name: Build docs
        run: mdbook build docs
      - name: Copy PDF into HTML site
        run: cp docs/book/pdf/output.pdf docs/book/html/kongming-hv.pdf
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
