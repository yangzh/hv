name: Deploy docs

on:
  push:
    branches: [main]
    paths: [docs/**]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mdBook and plugins
        run: |
          mkdir -p $HOME/bin
          curl -sSL https://github.com/rust-lang/mdBook/releases/latest/download/mdbook-v0.4.47-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C $HOME/bin
          curl -sSL https://github.com/nicoulaj/mdbook-pdf/releases/latest/download/mdbook-pdf-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C $HOME/bin
          curl -sSL https://github.com/lzanini/mdbook-katex/releases/download/v0.10.0-alpha/mdbook-katex-v0.10.0-alpha-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C $HOME/bin
          curl -sSL https://github.com/nicoulaj/mdbook-tabs/releases/latest/download/mdbook-tabs-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C $HOME/bin
          echo "$HOME/bin" >> $GITHUB_PATH
      - name: Install tab assets
        run: cd docs && mdbook-tabs install
      - name: Build docs
        run: mdbook build docs
      - name: Copy PDF into HTML site
        run: cp docs/book/pdf/output.pdf docs/book/html/kongming-hv.pdf
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
