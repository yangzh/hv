[book]
title = "Kongming HV Documentation"
authors = ["Kevin Yang"]
language = "en"
src = "src"

[build]
build-dir = "book"

[output.html]
git-repository-url = "https://github.com/yangzh/hv"
edit-url-template = "https://github.com/yangzh/hv/edit/main/docs/src/{path}"
site-url = "/hv/"
default-theme = "light"
preferred-dark-theme = "ayu"
additional-css = ["theme/tabs.css", "theme/last-changed.css", "theme/callouts.css"]
additional-js = ["theme/tabs.js"]

[output.html.search]
enable = true

[preprocessor.last-changed]
command = "mdbook-last-changed"
renderer = ["html"]

[preprocessor.katex]
renderers = ["html", "pdf"]

[preprocessor.tabs]

# TODO: re-enable when mdbook-linkcheck supports mdbook 0.5+
# [output.linkcheck]
# warning-policy = "warn"

[output.pdf]
title = "Kongming HV Documentation"
